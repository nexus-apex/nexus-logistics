{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Shipment | NexusLogistics{% endblock %}
{% block page_title %}{% if editing %}Edit Shipment{% else %}New Shipment{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Tracking Number</label>
        <input type="text" name="tracking_number" value="{{ record.tracking_number|default:'' }}">
      </div>
      <div class="form-group">
        <label>Origin</label>
        <input type="text" name="origin" value="{{ record.origin|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Destination</label>
        <input type="text" name="destination" value="{{ record.destination|default:'' }}">
      </div>
      <div class="form-group">
        <label>Weight Kg</label>
        <input type="number" step="0.01" name="weight_kg" value="{{ record.weight_kg|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="booked" {% if record.status == 'booked' %}selected{% endif %}>Booked</option>
          <option value="picked_up" {% if record.status == 'picked_up' %}selected{% endif %}>Picked Up</option>
          <option value="in_transit" {% if record.status == 'in_transit' %}selected{% endif %}>In Transit</option>
          <option value="delivered" {% if record.status == 'delivered' %}selected{% endif %}>Delivered</option>
          <option value="returned" {% if record.status == 'returned' %}selected{% endif %}>Returned</option>
        </select>
      </div>
      <div class="form-group">
        <label>Carrier</label>
        <input type="text" name="carrier" value="{{ record.carrier|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Estimated Delivery</label>
        <input type="date" name="estimated_delivery" value="{{ record.estimated_delivery|date:'Y-m-d'|default:'' }}">
      </div>
      <div class="form-group">
        <label>Cost</label>
        <input type="number" step="0.01" name="cost" value="{{ record.cost|default:'0' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Shipment</button>
      <a href="/shipments/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
