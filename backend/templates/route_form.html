{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Route | NexusLogistics{% endblock %}
{% block page_title %}{% if editing %}Edit Route{% else %}New Route{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Origin</label>
        <input type="text" name="origin" value="{{ record.origin|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Destination</label>
        <input type="text" name="destination" value="{{ record.destination|default:'' }}">
      </div>
      <div class="form-group">
        <label>Distance Km</label>
        <input type="number" step="0.01" name="distance_km" value="{{ record.distance_km|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Transit Days</label>
        <input type="number" name="transit_days" value="{{ record.transit_days|default:'0' }}">
      </div>
      <div class="form-group">
        <label>Cost Per Kg</label>
        <input type="number" step="0.01" name="cost_per_kg" value="{{ record.cost_per_kg|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Carrier Name</label>
        <input type="text" name="carrier_name" value="{{ record.carrier_name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="active" {% if record.status == 'active' %}selected{% endif %}>Active</option>
          <option value="inactive" {% if record.status == 'inactive' %}selected{% endif %}>Inactive</option>
        </select>
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Route</button>
      <a href="/routes/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
